pages:
  image: ruby:3.2.2
  stage: deploy
  script:
    - apt-get install -y libcurl4 libcurl3-gnutls libcurl4-openssl-dev
    - bundle install  -j4
    - export LC_ALL=C.UTF-8
    - export LANG=C
    - export LANGUAGE=C.UTF-8
    - echo $LC_ALL $LANG $LANGUAGE
    - locale
    - nanoc compile
    - mkdir -p public
    - cp -a output/* public/
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_BRANCH == "main"
