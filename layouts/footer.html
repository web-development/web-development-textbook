<script>
  document.addEventListener("DOMContentLoaded", () => {
    const nav = document.querySelector("ul.nav");
    const insertHere = document.querySelector(
      '#sidebar .page-header'
    );
    if (!nav) return;
    const detailsList = Array.from(nav.querySelectorAll(":scope > li > details"));

    function setAll(open) {
      detailsList.forEach(d => { d.open = open; });
      saveState();
    }

    function saveState() {
      localStorage.setItem("nav-state", detailsList.map(d => d.open ? "+" : "-").join(""));
    }

    const stored = localStorage.getItem("nav-state");
    if (stored) {
      stored.split("").forEach((ch, i) => { if (detailsList[i]) detailsList[i].open = ch === "+"; });
    }

    detailsList.forEach(d => d.addEventListener("toggle", saveState));

    const openLink = document.createElement("a");
    openLink.href = "#";
    openLink.textContent = "open all";
    openLink.addEventListener("click", (e) => { e.preventDefault(); setAll(true); });

    const closeLink = document.createElement("a");
    closeLink.href = "#";
    closeLink.textContent = "close all";
    closeLink.addEventListener("click", (e) => { e.preventDefault(); setAll(false); });

    const controls = document.createElement("p");
    controls.append(openLink, " | ", closeLink);
    nav.parentNode.insertBefore(controls,nav);
    console.log("will insert new controls before nav");

    console.log(controls);
    console.log(nav);

  });
</script>
<script>
  (function () {
    const toc = document.getElementById("toc");
    if (!toc) return;

    const headings = Array.from(
      document.querySelector("#body")?.querySelectorAll("h2[id], h3[id]") ?? []
    );
    console.log("TOC");
    console.dir(headings);
    if (headings.length < 2) { toc.style.visibility = "hidden"; return; }

    const h = document.createElement("h3");
    h.textContent = "Auf dieser Seite";
    toc.appendChild(h);

    const ul = document.createElement("ul");
    let currentSubUl = null;
    const tocItems = headings.map(heading => {
      const li = document.createElement("li");
      const a = document.createElement("a");
      a.href = "#" + heading.id;
      a.textContent = heading.textContent;
      li.appendChild(a);
      if (heading.tagName === "H2") {
        currentSubUl = document.createElement("ul");
        li.appendChild(currentSubUl);
        ul.appendChild(li);
      } else {
        li.classList.add("sub");
        (currentSubUl ?? ul).appendChild(li);
      }
      return { li, heading };
    });
    toc.appendChild(ul);

    function updateToc() {
      const scrollY = window.scrollY + 80;
      let current = tocItems[0]?.heading;
      for (const { heading } of tocItems) {
        if (heading.offsetTop <= scrollY) current = heading;
        else break;
      }
      tocItems.forEach(({ li, heading }) => li.classList.toggle("active", heading === current));
    }

    window.addEventListener("scroll", updateToc, { passive: true });
    updateToc();
  })();
</script>
