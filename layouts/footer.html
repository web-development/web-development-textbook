<script>
  document.addEventListener("DOMContentLoaded", () => {
    const nav = document.querySelector("ul.nav");
    const items = nav.querySelectorAll(":scope > li");

    function setItem(li, open) {
      const sub = li.querySelector(":scope > ul");
      const icon = li.querySelector(":scope > i");
      if (sub) sub.style.display = open ? "" : "none";
      if (icon) { icon.className = open ? "icon-minus" : "icon-plus"; }
    }

    function setAll(open) {
      items.forEach(li => setItem(li, open));
      saveState();
    }

    function saveState() {
      localStorage.setItem("nav-state",
        Array.from(items, li => li.querySelector(":scope > i")?.classList.contains("icon-minus") ? "+" : "-").join("")
      );
    }

    items.forEach(li => {
      const icon = document.createElement("i");
      icon.className = "icon-plus";
      li.querySelector(":scope > a")?.before(icon);
      li.style.listStyle = "none";
    });

    const stored = localStorage.getItem("nav-state");
    if (stored) {
      stored.split("").forEach((ch, i) => { if (items[i]) setItem(items[i], ch === "+"); });
    } else {
      setAll(false);
    }
    items.forEach(li => { if (li.classList.contains("active")) setItem(li, true); });

    const controls = document.createElement("li");
    controls.style.listStyle = "none";
    controls.innerHTML = '<a href="#">open all</a> | <a href="#">close all</a>';
    nav.prepend(controls);
    controls.children[0].addEventListener("click", (e) => { e.preventDefault(); setAll(true); });
    controls.children[1].addEventListener("click", (e) => { e.preventDefault(); setAll(false); });

    nav.addEventListener("click", (e) => {
      if (e.target.tagName !== "I") return;
      e.preventDefault();
      const li = e.target.parentElement;
      setItem(li, e.target.classList.contains("icon-plus"));
      saveState();
    });
  });
</script>
<script>
  (function () {
    const toc = document.getElementById("toc");
    if (!toc) return;

    const headings = Array.from(
      document.querySelector("#body .span8")?.querySelectorAll("h2[id], h3[id]") ?? []
    );
    if (headings.length < 2) { toc.style.display = "none"; return; }

    const h = document.createElement("h3");
    h.textContent = "Auf dieser Seite";
    toc.appendChild(h);

    const ul = document.createElement("ul");
    let currentSubUl = null;
    const tocItems = headings.map(heading => {
      const li = document.createElement("li");
      const a = document.createElement("a");
      a.href = "#" + heading.id;
      a.textContent = heading.textContent;
      li.appendChild(a);
      if (heading.tagName === "H2") {
        currentSubUl = document.createElement("ul");
        li.appendChild(currentSubUl);
        ul.appendChild(li);
      } else {
        li.classList.add("sub");
        (currentSubUl ?? ul).appendChild(li);
      }
      return { li, heading };
    });
    toc.appendChild(ul);

    function updateToc() {
      const scrollY = window.scrollY + 80;
      let current = tocItems[0]?.heading;
      for (const { heading } of tocItems) {
        if (heading.offsetTop <= scrollY) current = heading;
        else break;
      }
      tocItems.forEach(({ li, heading }) => li.classList.toggle("active", heading === current));
    }

    window.addEventListener("scroll", updateToc, { passive: true });
    updateToc();
  })();
</script>
